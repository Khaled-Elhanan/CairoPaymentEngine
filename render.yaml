services:
  - type: web
    name: cairopaymentengine-api
    env: dotnet
    plan: free
    buildCommand: dotnet publish CairoPaymentEngine.Api/CairoPaymentEngine.Api.csproj -c Release -o out
    startCommand: dotnet out/CairoPaymentEngine.Api.dll
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: UseHttpsRedirection
        value: "false"
      - key: Database__RunMigrationsOnStartup
        value: "true"
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend-service.onrender.com
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Gateways__Stripe__PublishableKey
        sync: false
      - key: Gateways__Stripe__SecretKey
        sync: false
      - key: Gateways__Stripe__WebhookSecret
        sync: false
      - key: Gateways__Paymob__ApiKey
        sync: false
      - key: Gateways__Paymob__IntegrationId
        sync: false
      - key: Gateways__Paymob__IframeId
        sync: false
      - key: Gateways__Paymob__HmacSecret
        sync: false

  - type: static
    name: cairopaymentengine-frontend
    rootDir: tenantix-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://your-backend-service.onrender.com
      - key: VITE_PAYMOB_IFRAME_ID
        sync: false
